<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Procédures - Interbev</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background-color: #F3F4F6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const COLORS = {
            red: "#C01030",
            redLight: "#FDF2F2",
            navy: "#1A3068",
            navyLight: "#EEF0F7",
            dark: "#1A1A1A",
            gray: "#6B7280",
            grayLight: "#F3F4F6",
            border: "#E5E7EB",
            white: "#FFFFFF",
            green: "#059669",
            greenLight: "#ECFDF5",
            amber: "#D97706",
        };

        const PROCESSES = {
            ndf: {
                title: "1. Notes de Frais (NDF)",
                icon: "📋",
                subTypes: {
                    interne: { label: "Cas interne", color: COLORS.navy },
                    externe_physique: { label: "Cas externe — Physique", color: COLORS.navy },
                    externe_moral: { label: "Cas externe — Moral", color: COLORS.red },
                },
                checks: {
                    interne: [
                        { id: "ndf_int_1", text: "Objet de la dépense précisé (événement générateur)" },
                        { id: "ndf_int_2", text: "Montants et dates vérifiés entre justificatifs et déclaré" },
                        { id: "ndf_int_3", text: "Code analytique noté (budget département)" },
                        { id: "ndf_int_4", text: "Affaire : code vérifié sur ERP (Présence/Ouverture)" },
                        { id: "ndf_int_5", text: "Repas : vérifier si TR (titre-restaurant) → non remboursable" },
                        { id: "ndf_int_6", text: "Si absence d'originaux → attestation sur l'honneur jointe" },
                        { id: "ndf_int_7", text: "Frais kilométriques transmis au responsable" },
                    ],
                    externe_physique: [
                        { id: "ndf_ep_1", text: "Objet de la dépense précisé" },
                        { id: "ndf_ep_4", text: "Affaire : code vérifié sur ERP de référence" },
                        { id: "ndf_ep_7", text: "Frais kilométriques transmis au pôle validation" },
                    ],
                    externe_moral: [
                        { id: "ndf_em_1", text: "⚠ FACTURE obligatoire (personne morale)", alert: true },
                        { id: "ndf_em_2", text: "Bon modèle utilisé (moral ≠ physique)", alert: true },
                        { id: "ndf_em_6", text: "Affaire : code vérifié sur ERP de référence" },
                    ],
                },
            },
            debit: {
                title: "2. Notes de débit",
                icon: "📑",
                subTypes: null,
                checks: {
                    default: [
                        { id: "deb_1", text: "Justificatifs + attestation sur l'honneur reçus" },
                        { id: "deb_2", text: "Ordre : Note de débit → Attestation → Récap justificatifs" },
                        { id: "deb_4", text: "⚠ Aucun code achat / analytique saisi", alert: true },
                        { id: "deb_5", text: "Affectation transmise au pôle validation" },
                    ],
                },
            },
            facturation: {
                title: "4. Facturation",
                icon: "🧾",
                subTypes: null,
                checks: {
                    default: [
                        { id: "fac_1", text: "ERP : code action/affaire/analytique vérifié" },
                        { id: "fac_4", text: "Code article vérifié (Service / Honoraires / Conseil)" },
                        { id: "fac_6", text: "Bénéficiaire indiqué sur la facture", section: "Mentions obligatoires" },
                        { id: "fac_8", text: "Numéro SIRET et coordonnées bancaires présents" },
                    ],
                },
            }
        };

        const STORAGE_KEY = "interbev-checklist-v2";

        function App() {
            const [process, setProcess] = useState(null);
            const [subType, setSubType] = useState(null);
            const [checked, setChecked] = useState({});
            const [dossierName, setDossierName] = useState("");
            const [history, setHistory] = useState([]);
            const [showHistory, setShowHistory] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const d = JSON.parse(saved);
                    if (d.history) setHistory(d.history);
                }
            }, []);

            const currentChecks = process ? (PROCESSES[process]?.checks?.[subType || "default"] || []) : [];
            const progress = currentChecks.length ? Math.round((currentChecks.filter(c => checked[c.id]).length / currentChecks.length) * 100) : 0;

            const toggle = (id) => setChecked(prev => ({ ...prev, [id]: !prev[id] }));

            const resetChecklist = () => {
                if (progress > 0 && dossierName) {
                    const newHistory = [{
                        name: dossierName,
                        process: PROCESSES[process]?.title,
                        date: new Date().toLocaleDateString("fr-FR"),
                        progress
                    }, ...history].slice(0, 10);
                    setHistory(newHistory);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ history: newHistory }));
                }
                setChecked({});
                setDossierName("");
            };

            if (!process) {
                return (
                    <div>
                        <div style={{ background: `linear-gradient(135deg, ${COLORS.navy} 0%, ${COLORS.red} 100%)`, padding: "32
